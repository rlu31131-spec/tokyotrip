<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京七日深度旅遊 | Tokyo Trip</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary-accent: #2c5364;
            --gold-accent: #c5a059;
            --bg-color: #fcfbf9;
        }

        /* 效能優化：減少重繪 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            max-width: 100%;
            overflow-x: hidden !important;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            -webkit-overflow-scrolling: touch;
        }

        body { font-family: 'Noto Sans TC', sans-serif; color: #444; line-height: 1.6; }

        /* --- Hero --- */
        .hero-section {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('tokyotrip/index/tokyo.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 5rem); letter-spacing: 5px; }

        /* --- Nav --- */
        .quick-nav {
            position: -webkit-sticky; position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid #eee; padding: 10px 0;
        }
        .nav-scroller {
            display: flex; justify-content: center; gap: 8px;
            overflow-x: auto; padding: 5px 15px; scrollbar-width: none;
        }
        .nav-scroller::-webkit-scrollbar { display: none; }
        .nav-dot {
            min-width: 75px; height: 38px; border-radius: 20px; border: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: #666; font-size: 0.85rem; font-weight: bold; background: #fff;
        }
        .nav-dot.active { background: var(--primary-accent); color: #fff; border-color: var(--primary-accent); }

        /* --- Timeline --- */
        .timeline-container { position: relative; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .timeline-container::after {
            content: ''; position: absolute; width: 2px; background: var(--gold-accent);
            top: 0; bottom: 0; left: 50%; opacity: 0.2; margin-left: -1px;
        }

        .timeline-item { position: relative; width: 50%; margin-bottom: 40px; z-index: 2; }
        .timeline-item.left { left: 0; padding-right: 30px; text-align: right; }
        .timeline-item.right { left: 50%; padding-left: 30px; text-align: left; }

        .timeline-item::after {
            content: ''; position: absolute; width: 12px; height: 12px; 
            background: #fff; border: 2px solid var(--gold-accent);
            top: 20px; border-radius: 50%; z-index: 3;
        }
        .timeline-item.left::after { right: -6px; }
        .timeline-item.right::after { left: -6px; }

        /* --- Card --- */
        .content-card {
            display: block; text-decoration: none; color: inherit;
            background: #fff; border-radius: 10px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); will-change: transform;
        }
        .card-img-frame { height: 220px; background: #f0f0f0; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; position: relative; }
        .day-label { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: rgba(0,0,0,0.03); position: absolute; top: 5px; }
        .left .day-label { right: 15px; } .right .day-label { left: 15px; }

        .card-title { font-size: 1.2rem; color: var(--primary-accent); font-weight: 700; margin: 5px 0; }
        .card-meta { font-size: 0.75rem; color: var(--gold-accent); font-weight: bold; }
        .card-desc { font-size: 0.85rem; color: #777; margin: 0; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .timeline-container::after { left: 30px; }
            .timeline-item { width: 100% !important; left: 0 !important; padding-left: 50px !important; padding-right: 0 !important; text-align: left !important; }
            .timeline-item::after { left: 24px !important; }
            .left .day-label, .right .day-label { right: 15px !important; left: auto !important; }
            .nav-scroller { justify-content: flex-start; }
            /* 手機版強制取消 AOS 的左右位移，避免渲染當機 */
            [data-aos] { transform: none !important; transition-duration: 0.4s !important; }
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <h1 class="hero-title">TOKYO</h1>
        <div style="letter-spacing: 3px; border-top: 1px solid #fff; padding-top: 5px;">7 DAYS JOURNEY</div>
    </header>

    <nav class="quick-nav">
        <div class="nav-scroller" id="navScroller">
            <a href="#day1" class="nav-dot">Day 1</a>
            <a href="#day2" class="nav-dot">Day 2</a>
            <a href="#day3" class="nav-dot">Day 3</a>
            <a href="#day4" class="nav-dot">Day 4</a>
            <a href="#day5" class="nav-dot">Day 5</a>
            <a href="#day6" class="nav-dot">Day 6</a>
            <a href="#day7" class="nav-dot">Day 7</a>
        </div>
    </nav>

    <main class="timeline-container">
        <div id="day1" class="timeline-item left" data-aos="fade-up">
            <a href="day1.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day1/grasstemple.jpg" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">01</div><div class="card-meta">上野・淺草</div><h3 class="card-title">下町風情巡禮</h3><p class="card-desc">雷門紅燈籠與晴空塔的時空對話。</p></div>
            </a>
        </div>
        <div id="day2" class="timeline-item right" data-aos="fade-up">
            <a href="day2.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day2/seapark.webp" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">02</div><div class="card-meta">台場・秋葉原</div><h3 class="card-title">海灣與電氣</h3><p class="card-desc">從未來感建築到霓虹光影。</p></div>
            </a>
        </div>

        <div id="day3" class="timeline-item left" data-aos="fade-up">
            <a href="day3.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day3/zoo.webp" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">03</div><div class="card-meta">池袋・巢鴨</div><h3 class="card-title">路面電車散策</h3><p class="card-desc">叮叮車穿梭的昭和日常。</p></div>
            </a>
        </div>

        <div id="day4" class="timeline-item right" data-aos="fade-up">
            <a href="day4.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day4/shoppingstreet.jpg" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">04</div><div class="card-meta">川越</div><h3 class="card-title">穿越小江戶</h3><p class="card-desc">藏造老街的時光旅行。</p></div>
            </a>
        </div>

        <div id="day5" class="timeline-item left" data-aos="fade-up">
            <a href="day5.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day5/train.jpg" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">05</div><div class="card-meta">湘南・橫濱</div><h3 class="card-title">海之記憶</h3><p class="card-desc">灌籃高手的平交道與港都。</p></div>
            </a>
        </div>

        <div id="day6" class="timeline-item right" data-aos="fade-up">
            <a href="day6.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day6/tokyotower.webp" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">06</div><div class="card-meta">港區・日本橋</div><h3 class="card-title">地標與經典</h3><p class="card-desc">見證東京塔的夕陽浪漫。</p></div>
            </a>
        </div>

        <div id="day7" class="timeline-item left" data-aos="fade-up">
            <a href="day7.html" class="content-card">
                <div class="card-img-frame"><img src="tokyotrip/day7/airport.webp" class="card-img" loading="lazy"></div>
                <div class="card-body"><div class="day-label">07</div><div class="card-meta">成田機場</div><h3 class="card-title">最後的賦歸</h3><p class="card-desc">帶著滿滿回憶踏上歸途。</p></div>
            </a>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 效能優化版的 AOS 初始化
        AOS.init({ duration: 400, once: true, offset: 20 });

        const dots = document.querySelectorAll('.nav-dot');
        const items = document.querySelectorAll('.timeline-item');
        let isScrolling = false;

        // 防抖滾動偵測 (每 100ms 執行一次，避免卡頓)
        window.addEventListener('scroll', () => {
            if (!isScrolling) {
                window.requestAnimationFrame(() => {
                    let curr = "";
                    const trigger = window.innerHeight / 3;
                    items.forEach(it => {
                        if (window.pageYOffset >= it.offsetTop - trigger) {
                            curr = it.getAttribute('id');
                        }
                    });
                    dots.forEach(d => {
                        d.classList.toggle('active', d.getAttribute('href') === `#${curr}`);
                        if (d.classList.contains('active')) {
                           d.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
                        }
                    });
                    isScrolling = false;
                });
                isScrolling = true;
            }
        });
    </script>
</body>
</html>
